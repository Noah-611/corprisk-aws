<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CorpRisk - 기업 재무 리스크 분석</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>CorpRisk</h1>
            <h2>기업 재무 리스크 분석 대시보드</h2>

            <p>
                기업을 선택하면 재무제표 데이터를 기반으로 부채비율, 수익성, 유동성 등을 계산하여
                재무 리스크를 분석합니다.
            </p>

            <form action="/analyze" method="post">
                <label for="company_name">분석할 기업 선택</label>

                <select name="company_name" id="company_name">
                    {% for company in companies %}
                    <option value="{{ company }}">{{ company }}</option>
                    {% endfor %}
                </select>

                <button type="submit">분석하기</button>
            </form>
            <a class="back-link" href="/history">최근 분석 이력 보기 →</a>
        </div>

        <div class="card">
            <h3>프로젝트 개요</h3>
            <p>
                CorpRisk는 기업 재무 데이터를 기반으로 주요 재무비율을 계산하고,
                기업의 재무 안정성과 위험도를 분석하는 AWS 기반 웹서비스입니다.
            </p>

            <p class="info-text">
                선택한 상장기업의 종목코드를 기준으로 OpenDART API에서 실제 재무제표 데이터를 조회하고,
                주요 재무비율과 리스크 등급을 계산합니다.
        </div>
    </div>
</body>
</html>
